title: Manual do V3RHelp!
description: >-
  Guia de uso do V3RHelp! — o sistema de chamados (helpdesk) para WordPress.
  Para a equipe de suporte e para quem abre chamados.
url: https://docs.v3rhelp.v3rtech.com.br

# Tema (GitHub Pages compila o Jekyll nativamente com remote_theme).
remote_theme: just-the-docs/just-the-docs

# Busca no topo do manual.
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Aparência.
color_scheme: light
# logo: "/assets/v3rhelp-logo-horizontal.png"   # habilitar quando o asset estiver publicado
favicon_ico: "/assets/favicon.ico"

# Diagramas de fluxo (usados em "Como usar bem o V3RHelp").
mermaid:
  version: "10.9.1"

# Links auxiliares (canto superior direito).
aux_links:
  "Site da V3RTECH":
    - "https://v3rtech.com.br/"
aux_links_new_tab: true

# Rodapé.
footer_content: >-
  © 2026 V3RTECH · V3RHelp! —
  <a href="/legal/privacidade/">Política de Privacidade</a> ·
  <a href="/legal/termos/">Termos de Uso</a> ·
  <a href="/legal/licenca/">Licença</a>

# Callouts (caixas de destaque) usados nas páginas.
callouts:
  importante:
    title: "Por que isso é importante"
    color: green
  dica:
    title: "Dica"
    color: blue
  atencao:
    title: "Atenção"
    color: yellow
  exemplo:
    title: "Exemplo prático"
    color: purple

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
